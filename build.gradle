plugins {
    id 'application'
}

application {
    mainClass = 'com.onelauncher.Main'
}

apply plugin: 'java'

repositories {
    mavenCentral()
}

dependencies {
    // The production code uses the SLF4J logging API at compile time
    compile 'org.slf4j:slf4j-api:1.7.25'

    implementation 'com.google.code.gson:gson:2.13.1'
}